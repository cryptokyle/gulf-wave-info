<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Gulf of Mexico</title>
  <style>
    :root{--bg:#0b1220;--panel:#0f1a33;--panel2:#06102a;--border:#203056;--border2:#2a3a64;--text:#e8eefc;--muted:#a7b4db;--accent:#1677ff}
    html,body{height:100%;overflow:hidden}
    body{font:14px/1.35 system-ui;margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

    /* Full-width header + main (no max-width cap) */
    header{width:100%;padding:14px 18px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex:0 0 auto;box-sizing:border-box}
    main{width:100%;padding:0 18px 18px;flex:1 1 auto;min-height:0;box-sizing:border-box}

    .title{font-weight:800;font-size:20px;justify-self:center}
    .actions{justify-self:end;display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    button,select,input,textarea{font:inherit;border-radius:12px;border:1px solid var(--border2);background:var(--panel);color:var(--text);padding:8px 10px}
    button{cursor:pointer;background:var(--accent);border-color:var(--accent)}
    button.secondary{background:var(--panel);border-color:var(--border2)}

    .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:12px;height:100%;display:flex;flex-direction:column;min-height:0}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    /* Map area fills remaining height without page scroll */
    .mapWrap{flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
    canvas{width:100%;height:100%;min-height:0;background:var(--panel2);border-radius:18px;border:1px solid var(--border)}

    .badges{display:flex;gap:8px;flex-wrap:wrap}
    .badges span{padding:4px 10px;border-radius:999px;background:#13214a;border:1px solid var(--border)}

    .below{flex:0 0 auto;margin-top:10px}
    .periodTitle{font-weight:800;margin-bottom:6px}

    /* Keep bottom section from increasing page height: horizontal scroll inside */
    .periodBar{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding-bottom:6px;-webkit-overflow-scrolling:touch}
    .bin{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);font-weight:800;color:#06102a;flex:0 0 auto}

    .legend{display:flex;gap:10px;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;font-size:12px;color:var(--muted);padding-bottom:2px}
    .sw{display:inline-flex;align-items:center;gap:6px;flex:0 0 auto}
    .sw i{display:inline-block;width:10px;height:10px;border-radius:3px;border:1px solid var(--border)}

    .muted{color:var(--muted)}

    /* Drawer collapses to ONLY the tab */
    .drawerWrap{position:fixed;top:90px;right:0;z-index:20;display:flex;align-items:flex-start}
    .drawerTab{writing-mode:vertical-rl;transform:rotate(180deg);padding:10px 12px;border-radius:12px 0 0 12px;background:#13214a;border:1px solid var(--border);cursor:pointer;font-weight:700;user-select:none;box-shadow:0 8px 30px rgba(0,0,0,.25)}
    .drawer{width:0;overflow:hidden;transition:width .2s ease;background:transparent;border:0;pointer-events:none}
    .drawer.open{width:360px;background:var(--panel);border:1px solid var(--border);border-right:none;border-radius:18px 0 0 18px;pointer-events:auto}
    .drawerInner{padding:12px;min-width:340px}
    .drawer:not(.open) .hide{display:none}

    textarea{width:100%;min-height:140px;resize:vertical}
  </style>
</head>
<body>
<header>
  <div></div>
  <div class="title">Gulf of Mexico</div>
  <div class="actions">
    <select id="units"><option value="imperial" selected>Imperial</option><option value="metric">Metric</option></select>
    <button id="live">Load Live</button>
  </div>
</header>

<main>
  <section class="card">
    <div class="row" style="justify-content:space-between">
      <div style="font-weight:800">Map</div>
      <div class="badges" id="badges"></div>
    </div>

    <div class="mapWrap"><canvas id="c"></canvas></div>

    <div class="below">
      <div class="periodTitle">Average Swell Period (Dominant) — West → East (~25 mi bins)</div>
      <div id="periods" class="periodBar"></div>
      <div class="legend" id="legend"></div>
    </div>
  </section>
</main>

<div class="drawerWrap">
  <div class="drawerTab" id="drawerTab">Controls ▸</div>
  <div class="drawer" id="drawer"><div class="drawerInner">
    <div style="font-weight:800">Controls</div>
    <div class="muted">Optional station filter</div>
    <div class="row" style="margin-top:6px"><input id="stations" placeholder="Station IDs" style="flex:1"/><button class="secondary" id="clear">Clear</button></div>
    <div class="hide" style="margin-top:12px"><textarea id="t" placeholder="# Paste latest_obs.txt here"></textarea><div class="row" style="justify-content:flex-end;margin-top:6px"><button class="secondary" id="parse">Parse Paste</button></div></div>
  </div></div>
</div>

<script>
const PROXY_URL='/.netlify/functions/ndbc-latest';
const $=id=>document.getElementById(id);
const C=$('c'),ctx=C.getContext('2d');
let rows=[], CW=800, CH=500;

// Fixed lon span; lat span auto-expands to match canvas aspect so there is no distortion.
const LON_MIN=-98, LON_MAX=-80;
const LAT_MIN_BASE=18, LAT_MAX_BASE=31.5;
let VIEW={lonMin:LON_MIN, lonMax:LON_MAX, latMin:LAT_MIN_BASE, latMax:LAT_MAX_BASE, cos:Math.cos(((LAT_MIN_BASE+LAT_MAX_BASE)/2)*Math.PI/180)};

const miss=v=>v==null||v===''||v==='MM';
const num=v=>miss(v)?null:+v;
const m2ft=m=>m==null?null:m*3.28084;

const LAND_GEOJSON=null;      // paste land polygons FeatureCollection
const BORDERS_GEOJSON=null;   // paste border lines FeatureCollection

function resize(){
  const r=C.getBoundingClientRect();
  CW=r.width; CH=r.height;
  const dpr=window.devicePixelRatio||1;
  C.width=Math.max(1,Math.round(CW*dpr));
  C.height=Math.max(1,Math.round(CH*dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);
  computeView();
  draw();
}
window.addEventListener('resize',resize,{passive:true});

function computeView(){
  const baseMid=(LAT_MIN_BASE+LAT_MAX_BASE)/2;
  const cos=Math.cos(baseMid*Math.PI/180);
  const xSpan=(LON_MAX-LON_MIN)*cos;
  const latSpanNeeded=xSpan*(CH/CW);
  let latMin=baseMid-latSpanNeeded/2, latMax=baseMid+latSpanNeeded/2;
  latMin=Math.min(latMin, LAT_MIN_BASE);
  latMax=Math.max(latMax, LAT_MAX_BASE);
  VIEW={lonMin:LON_MIN, lonMax:LON_MAX, latMin, latMax, cos};
}

function proj(lat,lon){
  const x=((lon-VIEW.lonMin)*VIEW.cos)/((VIEW.lonMax-VIEW.lonMin)*VIEW.cos)*CW;
  const y=(1-(lat-VIEW.latMin)/(VIEW.latMax-VIEW.latMin))*CH;
  return [x,y];
}

function pColor(s){return s<6?'#60a5fa':s<8?'#34d399':s<10?'#fbbf24':s<12?'#fb7185':'#a78bfa';}

function parseObs(txt){
  const set=new Set(($('stations').value||'').split(/[\s,]+/).filter(Boolean));
  rows=txt.split(/\r?\n/).filter(l=>l&&l[0]!=='#').map(l=>l.trim().split(/\s+/)).map(f=>({
    stn:f[0],lat:num(f[1]),lon:num(f[2]),wvht:num(f[11]),dpd:num(f[12])
  })).filter(p=>p.lat!=null&&p.lon!=null&&p.lon>=LON_MIN&&p.lon<=LON_MAX&&p.lat>=LAT_MIN_BASE&&p.lat<=LAT_MAX_BASE)
    .filter(p=>!set.size||set.has(p.stn));
  badges(); periods(); draw();
}

function badges(){
  const rep=rows.filter(r=>r.wvht!=null),max=rep.length?Math.max(...rep.map(r=>r.wvht)):0;
  const avg=rep.length?rep.reduce((a,r)=>a+r.wvht,0)/rep.length:0;
  $('badges').innerHTML=`<span>Stations: ${rows.length}</span><span>WVHT: ${rep.length}</span><span>Max: ${m2ft(max).toFixed(1)} ft</span><span>Avg: ${m2ft(avg).toFixed(1)} ft</span>`;
}

function periods(){
  const out=[];
  for(let lon=LON_MIN;lon<LON_MAX;lon+=0.36){
    const seg=rows.filter(r=>r.dpd!=null&&r.lon>=lon&&r.lon<lon+0.36);
    if(!seg.length) continue;
    const avg=seg.reduce((a,r)=>a+r.dpd,0)/seg.length;
    out.push({lon,avg});
  }
  $('periods').innerHTML=out.map(b=>`<span class="bin" style="background:${pColor(b.avg)}">${Math.abs(b.lon).toFixed(1)}°W ${b.avg.toFixed(1)}s</span>`).join('');
  $('legend').innerHTML=
    `<span class="sw"><i style="background:#60a5fa"></i>&lt;6s</span>`+
    `<span class="sw"><i style="background:#34d399"></i>6–8s</span>`+
    `<span class="sw"><i style="background:#fbbf24"></i>8–10s</span>`+
    `<span class="sw"><i style="background:#fb7185"></i>10–12s</span>`+
    `<span class="sw"><i style="background:#a78bfa"></i>12s+</span>`;
}

function drawGeoJSONPolys(geo, fill, stroke){
  const feats=geo && geo.type==='FeatureCollection' ? geo.features : [];
  ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.lineWidth=1;
  for(const f of feats){
    const g=f && f.geometry; if(!g) continue;
    const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:null;
    if(!polys) continue;
    for(const poly of polys){
      ctx.beginPath();
      for(const ring of poly){ring.forEach((pt,i)=>{const [x,y]=proj(pt[1],pt[0]);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});}
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }
}

function drawGeoJSONLines(geo, stroke){
  const feats=geo && geo.type==='FeatureCollection' ? geo.features : [];
  ctx.strokeStyle=stroke; ctx.lineWidth=1;
  for(const f of feats){
    const g=f && f.geometry; if(!g) continue;
    const lines=g.type==='LineString'?[g.coordinates]:g.type==='MultiLineString'?g.coordinates:null;
    if(!lines) continue;
    for(const line of lines){
      ctx.beginPath(); line.forEach((pt,i)=>{const [x,y]=proj(pt[1],pt[0]);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}); ctx.stroke();
    }
  }
}

function drawGraticule(){
  const lonStep=2, latStep=2;
  ctx.globalAlpha=.18; ctx.strokeStyle='#203056'; ctx.lineWidth=1;
  for(let lon=Math.ceil(VIEW.lonMin/lonStep)*lonStep; lon<=VIEW.lonMax; lon+=lonStep){
    const [x0,y0]=proj(VIEW.latMin,lon), [x1,y1]=proj(VIEW.latMax,lon);
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    ctx.globalAlpha=.75; ctx.fillStyle='#a7b4db'; ctx.font='11px system-ui';
    ctx.fillText(`${Math.abs(lon)}°W`, x0+4, CH-6);
    ctx.globalAlpha=.18;
  }
  for(let lat=Math.ceil(VIEW.latMin/latStep)*latStep; lat<=VIEW.latMax; lat+=latStep){
    const [x0,y0]=proj(lat,VIEW.lonMin), [x1,y1]=proj(lat,VIEW.lonMax);
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    ctx.globalAlpha=.75; ctx.fillStyle='#a7b4db'; ctx.font='11px system-ui';
    ctx.fillText(`${lat.toFixed(0)}°N`, 6, y0-4);
    ctx.globalAlpha=.18;
  }
  ctx.globalAlpha=1;
}

function draw(){
  // ocean
  ctx.clearRect(0,0,CW,CH);
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#06102a'); g.addColorStop(1,'#071a36');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);

  // basemap
  if(LAND_GEOJSON) drawGeoJSONPolys(LAND_GEOJSON,'#0c1b3a','#2b4a73');
  if(BORDERS_GEOJSON) drawGeoJSONLines(BORDERS_GEOJSON,'#355f91');

  // gridlines + labels
  drawGraticule();

  // buoys (color by period, size by wave height)
  rows.forEach(p=>{
    const [x,y]=proj(p.lat,p.lon);
    const r=Math.max(2.5,Math.min(18,(p.wvht||0)*6));
    const col=p.dpd==null?'#93c5fd':pColor(p.dpd);
    ctx.beginPath(); ctx.fillStyle=col; ctx.globalAlpha=0.92;
    ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.strokeStyle='#0b1220'; ctx.lineWidth=1.2; ctx.stroke();
  });
}

$('live').onclick=async()=>{const r=await fetch(PROXY_URL);if(!r.ok)return alert('Fetch failed');parseObs(await r.text())};
$('parse').onclick=()=>parseObs($('t').value);
$('clear').onclick=()=>{rows=[];$('badges').innerHTML='';$('periods').innerHTML='';$('legend').innerHTML='';draw()};
$('units').onchange=()=>rows.length&&(badges(),periods(),draw());
$('drawerTab').onclick=()=>{const d=$('drawer');d.classList.toggle('open');$('drawerTab').textContent=d.classList.contains('open')?'Controls ◂':'Controls ▸'};

resize();
</script>
</body>
</html>
