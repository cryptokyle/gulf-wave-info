<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Gulf of Mexico</title>
  <style>
    :root{--bg:#0b1220;--panel:#0f1a33;--panel2:#06102a;--border:#203056;--border2:#2a3a64;--text:#e8eefc;--muted:#a7b4db;--accent:#1677ff}
    html[data-theme="midnight"]{--bg:#050814;--panel:#0a1026;--panel2:#03081a;--border:#1b2a4a;--border2:#22335a;--text:#f0f4ff;--muted:#9fb0d9;--accent:#3b82f6}

    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font:14px/1.35 system-ui;margin:0;color:var(--text);display:flex;flex-direction:column}

    header{width:100%;padding:6px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex:0 0 auto;box-sizing:border-box}
    main{width:100%;padding:0 6px 6px;flex:1 1 auto;min-height:0;box-sizing:border-box}

    .title{font-weight:800;font-size:20px;justify-self:center}
    .actions{justify-self:end;display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    button,select,input,textarea{font:inherit;border-radius:12px;border:1px solid var(--border2);background:var(--panel);color:var(--text);padding:8px 10px}
    button{cursor:pointer;background:var(--accent);border-color:var(--accent)}
    button.secondary{background:var(--panel);border-color:var(--border2)}

    .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:6px;height:100%;display:flex;flex-direction:column;min-height:0}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .mapWrap{flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
    canvas{width:100%;height:100%;min-height:0;background:var(--panel2);border-radius:8px;border:1px solid var(--border)}

    .badges{display:flex;gap:8px;flex-wrap:wrap}
    .badges span{padding:4px 10px;border-radius:999px;background:color-mix(in oklab, var(--panel) 40%, #13214a);border:1px solid var(--border)}
    .badgeSmall{font-size:12px;padding:3px 9px;opacity:.95}

    .below{flex:0 0 auto;margin-top:6px}
    .periodTitle{font-weight:800;margin-bottom:6px}

    .periodBar{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding-bottom:6px;-webkit-overflow-scrolling:touch}
    .bin{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);font-weight:800;color:#06102a;flex:0 0 auto}

    .legend{display:flex;gap:10px;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;font-size:12px;color:var(--muted);padding-bottom:2px}
    .sw{display:inline-flex;align-items:center;gap:6px;flex:0 0 auto}
    .sw i{display:inline-block;width:10px;height:10px;border-radius:3px;border:1px solid var(--border)}

    .drawerWrap{position:fixed;top:62px;right:0;z-index:20;display:flex;align-items:flex-start}
    .drawerTab{writing-mode:vertical-rl;transform:rotate(180deg);padding:10px 12px;border-radius:12px 0 0 12px;background:#13214a;border:1px solid var(--border);cursor:pointer;font-weight:700;user-select:none;box-shadow:0 8px 30px rgba(0,0,0,.25)}
    html[data-theme="midnight"] .drawerTab{background:#101a3a}
    .drawer{width:0;overflow:hidden;transition:width .2s ease;background:transparent;border:0;pointer-events:none}
    .drawer.open{width:360px;background:var(--panel);border:1px solid var(--border);border-right:none;border-radius:10px 0 0 10px;pointer-events:auto}
    .drawerInner{padding:12px;min-width:340px}
    .drawer:not(.open) .hide{display:none}

    textarea{width:100%;min-height:140px;resize:vertical}

    #tip{position:fixed;display:none;max-width:340px;padding:10px 12px;border-radius:14px;background:var(--panel);border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,.35);font-size:12px;pointer-events:none;z-index:50}
    #tip b{font-size:13px}
    #tip .muted{color:var(--muted)}
  </style>
</head>
<body>
<header>
  <div></div>
  <div class="title">Gulf of Mexico</div>
  <div class="actions">
    <button id="theme" class="secondary" title="Toggle theme">Dark</button>
    <select id="units" title="Waves & wind units"><option value="imperial" selected>Imperial</option><option value="metric">Metric</option></select>
    <select id="tempUnits" class="secondary" title="Temperature units"><option value="auto" selected>Temp: Auto</option><option value="F">Temp: °F</option><option value="C">Temp: °C</option></select>
    <button id="live">Load Live</button>
  </div>
</header>

<main>
  <section class="card">
    <div class="row" style="justify-content:space-between">
      <div style="font-weight:800">Map</div>
      <div class="badges" id="badges"></div>
    </div>

    <div class="mapWrap"><canvas id="c"></canvas></div>

    <div class="below">
      <div class="periodTitle">Average Swell Period (Dominant) — West → East (~25 mi bins)</div>
      <div id="periods" class="periodBar"></div>
      <div class="legend" id="legend"></div>
    </div>
  </section>
</main>

<div class="drawerWrap">
  <div class="drawerTab" id="drawerTab">Controls ▸</div>
  <div class="drawer" id="drawer"><div class="drawerInner">
    <div style="font-weight:800">Controls</div>
    <div style="color:var(--muted);font-size:12px">Optional station filter</div>
    <div class="row" style="margin-top:6px"><input id="stations" placeholder="Station IDs" style="flex:1"/><button class="secondary" id="clear">Clear</button></div>
    <div class="hide" style="margin-top:12px"><textarea id="t" placeholder="# Paste latest_obs.txt here"></textarea><div class="row" style="justify-content:flex-end;margin-top:6px"><button class="secondary" id="parse">Parse Paste</button></div></div>
  </div></div>
</div>

<div id="tip"></div>

<script>
const PROXY_URL='/.netlify/functions/ndbc-latest';
const $=id=>document.getElementById(id);
const C=$('c'),ctx=C.getContext('2d');
const tip=$('tip');
let rows=[], CW=800, CH=500;

const LON_MIN=-98, LON_MAX=-80;
const LAT_MIN_BASE=18, LAT_MAX_BASE=31.5;
let VIEW={lonMin:LON_MIN, lonMax:LON_MAX, latMin:LAT_MIN_BASE, latMax:LAT_MAX_BASE, cos:Math.cos(((LAT_MIN_BASE+LAT_MAX_BASE)/2)*Math.PI/180)};

const miss=v=>v==null||v===''||v==='MM';
const num=v=>miss(v)?null:+v;
const m2ft=m=>m==null?null:m*3.28084;
const ms2kt=s=>s==null?null:s*1.94384;
const c2f=c=>c==null?null:c*9/5+32;

const LAND_GEOJSON=null;      // land polygons FeatureCollection
const BORDERS_GEOJSON=null;   // border lines FeatureCollection

function resize(){
  const r=C.getBoundingClientRect();
  CW=r.width; CH=r.height;
  const dpr=window.devicePixelRatio||1;
  C.width=Math.max(1,Math.round(CW*dpr));
  C.height=Math.max(1,Math.round(CH*dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);
  computeView();
  draw();
}
window.addEventListener('resize',resize,{passive:true});

function computeView(){
  const baseMid=(LAT_MIN_BASE+LAT_MAX_BASE)/2;
  const cos=Math.cos(baseMid*Math.PI/180);
  const xSpan=(LON_MAX-LON_MIN)*cos;
  const latSpanNeeded=xSpan*(CH/CW);
  let latMin=baseMid-latSpanNeeded/2, latMax=baseMid+latSpanNeeded/2;
  latMin=Math.min(latMin, LAT_MIN_BASE);
  latMax=Math.max(latMax, LAT_MAX_BASE);
  VIEW={lonMin:LON_MIN, lonMax:LON_MAX, latMin, latMax, cos};
}

function proj(lat,lon){
  const x=((lon-VIEW.lonMin)*VIEW.cos)/((VIEW.lonMax-VIEW.lonMin)*VIEW.cos)*CW;
  const y=(1-(lat-VIEW.latMin)/(VIEW.latMax-VIEW.latMin))*CH;
  return [x,y];
}

function pColor(s){return s<6?'#60a5fa':s<8?'#34d399':s<10?'#fbbf24':s<12?'#fb7185':'#a78bfa';}

const pad=n=>String(n).padStart(2,'0');
function tzAbbrev(d){
  const p=new Intl.DateTimeFormat(undefined,{timeZoneName:'short'}).formatToParts(d);
  return (p.find(x=>x.type==='timeZoneName')?.value)||'';
}
function fmtLocal(ms){
  if(ms==null) return '—';
  const d=new Date(ms);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())} ${tzAbbrev(d)}`.trim();
}

function tempMode(){
  const t=$('tempUnits').value;
  if(t==='F'||t==='C') return t;
  return $('units').value==='imperial'?'F':'C';
}

function parseObs(txt){
  const set=new Set(($('stations').value||'').split(/[\s,]+/).filter(Boolean));
  rows=txt.split(/\r?\n/)
    .filter(l=>l&&l[0]!=='#')
    .map(l=>l.trim().split(/\s+/))
    .map(f=>{
      const yyyy=+f[3], mo=+f[4], dd=+f[5], hh=+f[6], mm=+f[7];
      const t=Number.isFinite(yyyy)&&Number.isFinite(mo)&&Number.isFinite(dd)&&Number.isFinite(hh)&&Number.isFinite(mm)
        ? Date.UTC(yyyy, mo-1, dd, hh, mm)
        : null;
      return {
        stn:f[0], lat:num(f[1]), lon:num(f[2]), t,
        wdir:num(f[8]), wspd:num(f[9]), gst:num(f[10]),
        wvht:num(f[11]), dpd:num(f[12]), apd:num(f[13]), mwd:num(f[14]),
        atmp:num(f[17]), wtmp:num(f[18])
      };
    })
    .filter(p=>p.lat!=null&&p.lon!=null&&p.lon>=LON_MIN&&p.lon<=LON_MAX&&p.lat>=LAT_MIN_BASE&&p.lat<=LAT_MAX_BASE)
    .filter(p=>!set.size||set.has(p.stn));
  badges(); periods(); draw();
}

function badges(){
  const rep=rows.filter(r=>r.wvht!=null);
  const max=rep.length?Math.max(...rep.map(r=>r.wvht)):0;
  const avg=rep.length?rep.reduce((a,r)=>a+r.wvht,0)/rep.length:0;
  const times=rows.map(r=>r.t).filter(t=>t!=null);
  const newest=times.length?Math.max(...times):null;
  const oldest=times.length?Math.min(...times):null;
  $('badges').innerHTML=
    `<span>Stations: ${rows.length}</span>`+
    `<span>WVHT: ${rep.length}</span>`+
    `<span>Max: ${m2ft(max).toFixed(1)} ft</span>`+
    `<span>Avg: ${m2ft(avg).toFixed(1)} ft</span>`+
    `<span class="badgeSmall">Obs: ${fmtLocal(newest)}</span>`+
    `<span class="badgeSmall">Oldest: ${fmtLocal(oldest)}</span>`;
}

function periods(){
  const out=[];
  for(let lon=LON_MIN;lon<LON_MAX;lon+=0.36){
    const seg=rows.filter(r=>r.dpd!=null&&r.lon>=lon&&r.lon<lon+0.36);
    if(!seg.length) continue;
    const avg=seg.reduce((a,r)=>a+r.dpd,0)/seg.length;
    out.push({lon,avg});
  }
  $('periods').innerHTML=out.map(b=>`<span class="bin" style="background:${pColor(b.avg)}">${Math.abs(b.lon).toFixed(1)}°W ${b.avg.toFixed(1)}s</span>`).join('');
  $('legend').innerHTML=
    `<span class="sw"><i style="background:#60a5fa"></i>&lt;6s</span>`+
    `<span class="sw"><i style="background:#34d399"></i>6–8s</span>`+
    `<span class="sw"><i style="background:#fbbf24"></i>8–10s</span>`+
    `<span class="sw"><i style="background:#fb7185"></i>10–12s</span>`+
    `<span class="sw"><i style="background:#a78bfa"></i>12s+</span>`;
}

function drawGeoJSONPolys(geo, fill, stroke){
  const feats=geo && geo.type==='FeatureCollection' ? geo.features : [];
  ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.lineWidth=1;
  for(const f of feats){
    const g=f && f.geometry; if(!g) continue;
    const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:null;
    if(!polys) continue;
    for(const poly of polys){
      ctx.beginPath();
      for(const ring of poly){ring.forEach((pt,i)=>{const [x,y]=proj(pt[1],pt[0]);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});}
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }
}

function drawGeoJSONLines(geo, stroke){
  const feats=geo && geo.type==='FeatureCollection' ? geo.features : [];
  ctx.strokeStyle=stroke; ctx.lineWidth=1;
  for(const f of feats){
    const g=f && f.geometry; if(!g) continue;
    const lines=g.type==='LineString'?[g.coordinates]:g.type==='MultiLineString'?g.coordinates:null;
    if(!lines) continue;
    for(const line of lines){
      ctx.beginPath(); line.forEach((pt,i)=>{const [x,y]=proj(pt[1],pt[0]);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}); ctx.stroke();
    }
  }
}

function drawGraticule(){
  const lonStep=2, latStep=2;
  ctx.globalAlpha=.18;
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'#203056';
  ctx.lineWidth=1;
  for(let lon=Math.ceil(VIEW.lonMin/lonStep)*lonStep; lon<=VIEW.lonMax; lon+=lonStep){
    const [x0,y0]=proj(VIEW.latMin,lon), [x1,y1]=proj(VIEW.latMax,lon);
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    ctx.globalAlpha=.75;
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim()||'#a7b4db';
    ctx.font='11px system-ui';
    ctx.fillText(`${Math.abs(lon)}°W`, x0+4, CH-6);
    ctx.globalAlpha=.18;
  }
  for(let lat=Math.ceil(VIEW.latMin/latStep)*latStep; lat<=VIEW.latMax; lat+=latStep){
    const [x0,y0]=proj(lat,VIEW.lonMin), [x1,y1]=proj(lat,VIEW.lonMax);
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    ctx.globalAlpha=.75;
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim()||'#a7b4db';
    ctx.font='11px system-ui';
    ctx.fillText(`${lat.toFixed(0)}°N`, 6, y0-4);
    ctx.globalAlpha=.18;
  }
  ctx.globalAlpha=1;
}

function draw(){
  ctx.clearRect(0,0,CW,CH);
  const grad=ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,getComputedStyle(document.documentElement).getPropertyValue('--panel2').trim()||'#06102a');
  grad.addColorStop(1,'#071a36');
  ctx.fillStyle=grad; ctx.fillRect(0,0,CW,CH);
  if(LAND_GEOJSON) drawGeoJSONPolys(LAND_GEOJSON,'#0c1b3a','#2b4a73');
  if(BORDERS_GEOJSON) drawGeoJSONLines(BORDERS_GEOJSON,'#355f91');
  drawGraticule();
  rows.forEach(p=>{
    const [x,y]=proj(p.lat,p.lon);
    const r=Math.max(2.5,Math.min(18,(p.wvht||0)*6));
    const col=p.dpd==null?'#93c5fd':pColor(p.dpd);
    ctx.beginPath(); ctx.fillStyle=col; ctx.globalAlpha=0.92;
    ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.strokeStyle='#0b1220'; ctx.lineWidth=1.2; ctx.stroke();
  });
}

C.addEventListener('mousemove',e=>{
  if(!rows.length){tip.style.display='none';return;}
  const r=C.getBoundingClientRect();
  const mx=(e.clientX-r.left), my=(e.clientY-r.top);
  let best=null, bd=1e9;
  for(const p of rows){
    const [x,y]=proj(p.lat,p.lon);
    const d=(x-mx)**2+(y-my)**2;
    if(d<bd){bd=d;best=p;}
  }
  if(!best||bd>500){tip.style.display='none';return;}

  const u=$('units').value;
  const wv=u==='imperial'?m2ft(best.wvht):best.wvht;
  const wvUnit=u==='imperial'?'ft':'m';
  const wind=u==='imperial'?ms2kt(best.wspd):best.wspd;
  const gust=u==='imperial'?ms2kt(best.gst):best.gst;
  const windUnit=u==='imperial'?'kt':'m/s';

  const tm=tempMode();
  const wtmp=tm==='F'?c2f(best.wtmp):best.wtmp;
  const atmp=tm==='F'?c2f(best.atmp):best.atmp;
  const tUnit=tm==='F'?'°F':'°C';

  tip.innerHTML=
    `<b>Station ${best.stn}</b><br>`+
    `<span class="muted">Obs (local):</span> ${fmtLocal(best.t)}<br>`+
    `<span class="muted">WVHT:</span> ${wv==null?'—':wv.toFixed(1)} ${wvUnit} &nbsp; <span class="muted">DPD:</span> ${best.dpd==null?'—':best.dpd.toFixed(1)} s<br>`+
    `<span class="muted">Wind:</span> ${wind==null?'—':wind.toFixed(1)} ${windUnit}`+
    `${best.wdir==null?'':` @ ${best.wdir.toFixed(0)}°`}`+
    `${gust==null?'':` (gust ${gust.toFixed(1)})`}<br>`+
    `<span class="muted">Water:</span> ${wtmp==null?'—':wtmp.toFixed(1)}${tUnit} &nbsp; <span class="muted">Air:</span> ${atmp==null?'—':atmp.toFixed(1)}${tUnit}`;

  tip.style.left=(e.clientX+12)+'px';
  tip.style.top=(e.clientY+12)+'px';
  tip.style.display='block';
});
C.addEventListener('mouseleave',()=>tip.style.display='none');

// Theme toggle
const THEMES=[{k:'dark',label:'Dark'},{k:'midnight',label:'Midnight'}];
let theme=localStorage.getItem('theme')||'dark';
function setTheme(t){theme=t;document.documentElement.dataset.theme=t;localStorage.setItem('theme',t);$('theme').textContent=THEMES.find(x=>x.k===t)?.label||'Theme';draw();}
$('theme').onclick=()=>setTheme(theme==='dark'?'midnight':'dark');
setTheme(theme);

$('live').onclick=async()=>{const r=await fetch(PROXY_URL);if(!r.ok)return alert('Fetch failed');parseObs(await r.text())};
$('parse').onclick=()=>parseObs($('t').value);
$('clear').onclick=()=>{rows=[];$('badges').innerHTML='';$('periods').innerHTML='';$('legend').innerHTML='';draw()};
$('units').onchange=()=>rows.length&&(badges(),periods(),draw());
$('tempUnits').onchange=()=>rows.length&&(badges(),draw());
$('drawerTab').onclick=()=>{const d=$('drawer');d.classList.toggle('open');$('drawerTab').textContent=d.classList.contains('open')?'Controls ◂':'Controls ▸'};

resize();
</script>
</body>
</html>
