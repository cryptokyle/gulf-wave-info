
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Gulf of Mexico</title>
  <style>
    :root{--bg:#0b1220;--panel:#0f1a33;--panel2:#06102a;--border:#203056;--border2:#2a3a64;--text:#e8eefc;--muted:#a7b4db;--accent:#1677ff}
    body{font:14px/1.35 system-ui;margin:0;background:var(--bg);color:var(--text)}
    header,main{max-width:1100px;margin:auto;padding:14px}
    header{display:flex;align-items:center;justify-content:space-between}
    .title{font-weight:800;font-size:20px}
    button,select,input,textarea{font:inherit;border-radius:12px;border:1px solid var(--border2);background:var(--panel);color:var(--text);padding:8px 10px}
    button{cursor:pointer;background:var(--accent);border-color:var(--accent)}
    button.secondary{background:var(--panel);border-color:var(--border2)}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:12px}
    canvas{width:100%;height:560px;background:var(--panel2);border-radius:18px;border:1px solid var(--border)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .badges{display:flex;gap:8px;flex-wrap:wrap}
    .badges span{padding:4px 10px;border-radius:999px;background:#13214a;border:1px solid var(--border)}
    .muted{color:var(--muted)}
    .below{margin-top:10px}

    /* Color-coded period band chips */
    .periodBar{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .bin{padding:4px 10px;border-radius:999px;border:1px solid var(--border);font-weight:700;color:#06102a}
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--muted)}
    .sw{display:inline-flex;align-items:center;gap:6px}
    .sw i{display:inline-block;width:10px;height:10px;border-radius:3px;border:1px solid var(--border)}

    /* Drawer */
    .drawerWrap{position:fixed;top:90px;right:0;z-index:20;display:flex}
    .drawerTab{writing-mode:vertical-rl;transform:rotate(180deg);padding:10px 12px;border-radius:12px 0 0 12px;background:#13214a;border:1px solid var(--border);border-right:none;cursor:pointer;font-weight:600}
    .drawer{width:56px;transition:width .2s ease;overflow:hidden;background:var(--panel);border:1px solid var(--border);border-right:none;border-radius:18px 0 0 18px}
    .drawer.open{width:360px}
    .drawerInner{padding:12px;min-width:340px}
    .drawer:not(.open) .hide{display:none}

    .tooltip{position:fixed;display:none;max-width:360px;padding:10px 12px;border-radius:14px;background:var(--panel);border:1px solid var(--border);font-size:12px;pointer-events:none;z-index:30}
  </style>
</head>
<body>
<header>
  <div class="title">Gulf of Mexico</div>
  <div class="row"><select id="units"><option value="imperial" selected>Imperial</option><option value="metric">Metric</option></select><button id="live">Load Live</button></div>
</header>

<main>
  <section class="card">
    <div class="row" style="justify-content:space-between"><div style="font-weight:700">Map</div><div class="badges" id="badges"></div></div>
    <canvas id="c" width="1080" height="560"></canvas>

    <div class="below">
      <div style="font-weight:700">Average Swell Period (Dominant) — West → East (~25 mi bins)</div>
      <div id="periods" class="periodBar"></div>
      <div class="legend" id="legend"></div>
    </div>
  </section>
</main>

<div class="drawerWrap"><div class="drawerTab" id="drawerTab">Controls ▸</div><div class="drawer" id="drawer"><div class="drawerInner"><div style="font-weight:700">Controls</div><div class="muted">Optional station filter</div><div class="row" style="margin-top:6px"><input id="stations" placeholder="Station IDs" style="flex:1"/><button class="secondary" id="clear">Clear</button></div><div class="hide" style="margin-top:12px"><textarea id="t" placeholder="# Paste latest_obs.txt here"></textarea><div class="row" style="justify-content:flex-end;margin-top:6px"><button class="secondary" id="parse">Parse Paste</button></div></div></div></div></div>
<div class="tooltip" id="tip"></div>

<script>
const PROXY_URL='/.netlify/functions/ndbc-latest',B={minLat:18,maxLat:31.5,minLon:-98,maxLon:-80},$=id=>document.getElementById(id),C=$('c'),ctx=C.getContext('2d');
let rows=[];
const miss=v=>v==null||v===''||v==='MM',num=v=>miss(v)?null:+v,m2ft=m=>m==null?null:m*3.28084;

// "Map style" basemap: fill land masses (rough polygons) + coastlines (still super lightweight, no external tiles)
const LAND=[
  // US Gulf coast / Florida (rough)
  [[31.5,-98],[31.5,-80],[30.8,-81.5],[30.4,-83],[30.1,-85],[30.3,-87.2],[30.35,-88.1],[29.9,-90.1],[29.2,-92.1],[28.9,-94.1],[28.5,-95.2],[27.9,-96.4],[26.8,-97.3],[31.5,-98]],
  // Mexico + Yucatan (rough)
  [[18,-98],[25.4,-97.8],[22.9,-96.5],[20.6,-94.7],[18.8,-92.2],[18.2,-89.3],[18.3,-88.3],[18,-98]],
  // Cuba (rough)
  [[23.3,-85.6],[22.6,-84.6],[21.6,-83.7],[20.5,-82.6],[19.4,-81.6],[21.5,-81.5],[22.8,-82.5],[23.3,-85.6]],
];

function proj(lat,lon){return[(lon-B.minLon)/(B.maxLon-B.minLon)*C.width,(1-(lat-B.minLat)/(B.maxLat-B.minLat))*C.height];}

function parseObs(txt){
  const set=new Set(($('stations').value||'').split(/[\s,]+/).filter(Boolean));
  rows=txt.split(/\r?\n/).filter(l=>l&&!l.startsWith('#')).map(l=>l.split(/\s+/)).map(f=>({
    stn:f[0],lat:num(f[1]),lon:num(f[2]),wvht:num(f[11]),dpd:num(f[12]),wdir:num(f[14]),wtmp:num(f[18])
  })).filter(p=>p.lat>=B.minLat&&p.lat<=B.maxLat&&p.lon>=B.minLon&&p.lon<=B.maxLon)
    .filter(p=>!set.size||set.has(p.stn));
  draw(); badges(); periods();
}

function badges(){
  const rep=rows.filter(r=>r.wvht!=null),max=Math.max(0,...rep.map(r=>r.wvht));
  const avg=rep.reduce((a,r)=>a+r.wvht,0)/Math.max(1,rep.length);
  $('badges').innerHTML=`<span>Stations: ${rows.length}</span><span>WVHT: ${rep.length}</span><span>Max: ${m2ft(max).toFixed(1)} ft</span><span>Avg: ${m2ft(avg).toFixed(1)} ft</span>`;
}

function pColor(s){
  if(s<6) return '#60a5fa';     // <6s blue
  if(s<8) return '#34d399';     // 6–8 green
  if(s<10) return '#fbbf24';    // 8–10 yellow
  if(s<12) return '#fb7185';    // 10–12 pink
  return '#a78bfa';             // 12+ purple
}

function periods(){
  const out=[];
  for(let lon=B.minLon;lon<B.maxLon;lon+=0.36){ // ~25 miles
    const seg=rows.filter(r=>r.dpd!=null&&r.lon>=lon&&r.lon<lon+0.36);
    if(!seg.length) continue;
    const avg=seg.reduce((a,r)=>a+r.dpd,0)/seg.length;
    out.push({lon,avg});
  }
  $('periods').innerHTML=out.map(b=>`<span class="bin" style="background:${pColor(b.avg)}">${Math.abs(b.lon).toFixed(1)}°W ${b.avg.toFixed(1)}s</span>`).join('');
  $('legend').innerHTML=
    `<span class="sw"><i style="background:#60a5fa"></i>&lt;6s</span>`+
    `<span class="sw"><i style="background:#34d399"></i>6–8s</span>`+
    `<span class="sw"><i style="background:#fbbf24"></i>8–10s</span>`+
    `<span class="sw"><i style="background:#fb7185"></i>10–12s</span>`+
    `<span class="sw"><i style="background:#a78bfa"></i>12s+</span>`;
}

function poly(points,fill,stroke){
  ctx.beginPath();
  points.forEach((p,i)=>{const[x,y]=proj(p[0],p[1]);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}
}

function draw(){
  // ocean background
  ctx.clearRect(0,0,C.width,C.height);
  const g=ctx.createLinearGradient(0,0,0,C.height);
  g.addColorStop(0,'#06102a'); g.addColorStop(1,'#071a36');
  ctx.fillStyle=g; ctx.fillRect(0,0,C.width,C.height);

  // subtle grid
  ctx.globalAlpha=.18; ctx.strokeStyle='#203056';
  for(let i=1;i<6;i++){
    ctx.beginPath();ctx.moveTo(i*C.width/6,0);ctx.lineTo(i*C.width/6,C.height);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*C.height/6);ctx.lineTo(C.width,i*C.height/6);ctx.stroke();
  }
  ctx.globalAlpha=1;

  // land masses
  ctx.lineWidth=1.5;
  LAND.forEach(p=>poly(p,'#0c1b3a','#2b4a73'));

  // buoy dots
  rows.forEach(p=>{
    const [x,y]=proj(p.lat,p.lon);
    const r=Math.max(3,Math.min(18,(p.wvht||0)*6));
    ctx.beginPath();
    ctx.fillStyle='#0ea5e9'; ctx.strokeStyle='#0284c7';
    ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  });
}

$('live').onclick=async()=>{const r=await fetch(PROXY_URL);if(!r.ok)return alert('Fetch failed');parseObs(await r.text())};
$('parse').onclick=()=>parseObs($('t').value);
$('clear').onclick=()=>{rows=[];ctx.clearRect(0,0,C.width,C.height);$('badges').innerHTML='';$('periods').innerHTML='';$('legend').innerHTML=''};
$('units').onchange=()=>rows.length&&(draw(),badges(),periods());
$('drawerTab').onclick=()=>{const d=$('drawer');d.classList.toggle('open');$('drawerTab').textContent=d.classList.contains('open')?'Controls ◂':'Controls ▸'};
</script>
</body>
</html>
